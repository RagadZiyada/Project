# Azure DevOps CI/CD Pipeline for H&M Recommendation System
# Team 60304248 - DSAI3202 Cloud Computing

trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: Validate
    displayName: 'Validate Notebooks'
    jobs:
      - job: ValidateNotebooks
        displayName: 'Validate Notebook Syntax'
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '3.9'
            displayName: 'Setup Python 3.9'

          - script: |
              python -m pip install --upgrade pip
              pip install nbformat
            displayName: 'Install dependencies'

          - script: |
              echo "Validating notebook files..."
              python -c "
              import nbformat
              import glob
              import sys

              notebooks = glob.glob('notebooks/**/*.ipynb', recursive=True)
              errors = []

              if not notebooks:
                  print('No notebook files found.')
                  sys.exit(1)

              for nb_path in notebooks:
                  try:
                      with open(nb_path, 'r', encoding='utf-8') as f:
                          nbformat.read(f, as_version=4)
                      print(f'{nb_path} - Valid')
                  except Exception as e:
                      print(f'{nb_path} - Error: {e}')
                      errors.append(nb_path)

              if errors:
                  print(f'\n{len(errors)} notebook(s) failed validation')
                  sys.exit(1)
              else:
                  print(f'\nAll {len(notebooks)} notebooks validated successfully')
              "
            displayName: 'Validate notebook JSON format'

          - script: |
              echo "==================================="
              echo "Repository Structure:"
              echo "==================================="
              echo ""
              echo "Phase 1 - Data Engineering:"
              ls -la notebooks/phase1/*.ipynb
              echo ""
              echo "Phase 2 - ML Pipeline:"
              ls -la notebooks/phase2/*.ipynb
              echo "==================================="
            displayName: 'List repository contents'

  - stage: Report
    displayName: 'Generate Report'
    dependsOn: Validate
    jobs:
      - job: GenerateReport
        displayName: 'Pipeline Summary'
        steps:
          - script: |
              echo "============================================="
              echo "   H&M RECOMMENDATION SYSTEM - CI/CD REPORT"
              echo "============================================="
              echo ""
              echo "Team: 60304248"
              echo "Project: DSAI3202 Cloud Computing Phase 2"
              echo ""
              echo "Validation completed successfully"
              echo ""
              echo "Notebooks Validated:"
              echo "  - notebooks/phase1/ (Data Engineering)"
              echo "  - notebooks/phase2/ (ML Pipeline)"
              echo ""
              echo "============================================="
            displayName: 'Print pipeline summary'
